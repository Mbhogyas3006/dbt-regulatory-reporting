name: dbt CI — Regulatory Reporting Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DBT_PROFILES_DIR: ./dbt_project
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

jobs:

  dbt-test:
    name: dbt build + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python generate_data.py

      - name: dbt deps — install packages
        run: |
          cd dbt_project
          dbt deps

      - name: dbt debug — check connection
        run: |
          cd dbt_project
          dbt debug --target dev
        continue-on-error: true

      - name: dbt run — staging models
        run: |
          cd dbt_project
          dbt run --select staging --target dev

      - name: dbt test — staging tests
        run: |
          cd dbt_project
          dbt test --select staging --target dev

      - name: dbt run — intermediate models
        run: |
          cd dbt_project
          dbt run --select intermediate --target dev

      - name: dbt run — mart models
        run: |
          cd dbt_project
          dbt run --select marts --target dev

      - name: dbt test — all models
        run: |
          cd dbt_project
          dbt test --target dev

      - name: dbt docs generate
        run: |
          cd dbt_project
          dbt docs generate --target dev

      - name: Upload dbt docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt_project/target/

      - name: dbt source freshness
        run: |
          cd dbt_project
          dbt source freshness --target dev
        continue-on-error: true

  great-expectations:
    name: Great Expectations data validation
    runs-on: ubuntu-latest
    needs: dbt-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data
        run: python generate_data.py

      - name: Run GE validation suite
        run: python great_expectations/run_validations.py

      - name: Upload GE results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ge-validation-results
          path: great_expectations/results/
